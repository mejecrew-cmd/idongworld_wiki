<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>아이동월드 · IDONG World</title>
  <meta name="description" content="IDOL + 動物 = 아이동. K-pop 시계와 함께하는 아이동월드." />

  <!-- 폰트: Air 토큰 대체서체 + 한글 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;500;700&family=Dancing+Script:wght@500;700&family=Space+Mono:wght@400;700&family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&family=Gowun+Dodum&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 하늘 배경 레이어 (구름·빛무리) -->
  <div class="sky" aria-hidden="true">
    <span class="cloud cloud-1"></span>
    <span class="cloud cloud-2"></span>
    <span class="cloud cloud-3"></span>
  </div>

  <!-- 상단 작은 아이동월드 + 현재 언어 칩 -->
  <header class="topbar">
    <span class="topbar__label" data-i18n="top_label">아이동월드</span>
    <button class="lang-chip" id="lang-chip" type="button" aria-label="language">
      <span class="lang-chip__dot"></span>
      <span id="lang-chip-name">한국어</span>
    </button>
  </header>

  <main class="page">

    <!-- 1. 히어로: IDO·NG World 워드마크 -->
    <section class="hero" id="top">
      <h1 class="wordmark morph" role="img" aria-label="IDONG World">
        <svg class="morph__svg" viewBox="0 0 420 220" overflow="visible" xmlns="http://www.w3.org/2000/svg">
          <g class="morph__float">
            <!-- 몽실몽실 빛가루 -->
            <circle class="m-spark s1" cx="92"  cy="58"  r="2.6"></circle>
            <circle class="m-spark s2" cx="322" cy="52"  r="3.2"></circle>
            <circle class="m-spark s3" cx="352" cy="150" r="2.4"></circle>
            <circle class="m-spark s4" cx="74"  cy="152" r="3"></circle>
            <circle class="m-spark s5" cx="208" cy="40"  r="2"></circle>
            <!-- 세 빛덩이가 모여 맺힘 -->
            <text class="m-ido"   text-anchor="end"    x="210" y="122">IDO</text>
            <text class="m-ng"    text-anchor="start"  x="214" y="122">NG</text>
            <text class="m-world" text-anchor="middle" x="198" y="184">World</text>
          </g>
        </svg>
      </h1>
      <p class="hero__caption" data-i18n="hero_caption">IDOL + 動物 = 아이동</p>

      <!-- 2. K-pop 시계 (현재 시각) -->
      <section class="clock" aria-label="K-pop clock">
        <p class="kicker" data-i18n="clock_kicker">지금, K-pop 시계</p>
        <div class="clock__face">
          <div class="clock__row clock__row--hour">
            <span class="clock__slot-tag" data-i18n="clock_tag_hour">時</span>
            <span class="clock__big" id="clock-hour-big"></span>
            <span class="clock__lyric" id="clock-hour-text"></span>
            <span class="clock__src" id="clock-hour-src"></span>
          </div>
          <div class="clock__divider"></div>
          <div class="clock__row clock__row--minute">
            <span class="clock__slot-tag" data-i18n="clock_tag_minute">分</span>
            <span class="clock__big" id="clock-minute-big"></span>
            <span class="clock__lyric" id="clock-minute-text"></span>
            <span class="clock__src" id="clock-minute-src"></span>
          </div>
          <div class="clock__digital" id="clock-digital">--:--</div>
        </div>
      </section>

      <a class="scroll-cue" href="#wiki" aria-hidden="true">▾</a>
    </section>

    <!-- ★ 아이동월드 위키 바로가기 (LIVE) -->
    <section class="wiki-cta" id="wiki">
      <a class="wiki-card" href="https://mejecrew-cmd.github.io/idongworld_wiki/">
        <span class="wiki-badge" data-i18n="wiki_badge">지금 공개</span>
        <p class="kicker" data-i18n="wiki_kicker">지금 바로</p>
        <h2 class="section-title wiki-title" data-i18n="wiki_title">아이동월드 위키</h2>
        <div class="aidong-cluster" aria-hidden="true">
          <img class="aidong-ava a1" src="images/aidong/pig.webp"   alt="" width="84" height="84" loading="lazy" />
          <img class="aidong-ava a2" src="images/aidong/whale.webp" alt="" width="92" height="92" loading="lazy" />
          <img class="aidong-ava a3" src="images/aidong/chick.webp" alt="" width="92" height="92" loading="lazy" />
          <img class="aidong-ava a4" src="images/aidong/frog.webp"  alt="" width="84" height="84" loading="lazy" />
        </div>
        <p class="body-text" data-i18n="wiki_body">2,832종 아이템 도감과 세계관을 한곳에. 반짝이는 아이동들의 세계를 둘러보세요.</p>
        <span class="wiki-btn" data-i18n="wiki_button">위키 구경하러 가기 →</span>
      </a>
    </section>

    <!-- 3. 별빛 언어 선택 -->
    <section class="langs" id="languages">
      <p class="kicker" data-i18n="lang_kicker">당신의 언어로</p>
      <h2 class="section-title" data-i18n="lang_title">별빛을 따라, 당신의 별을 톡</h2>
      <p class="section-hint" data-i18n="lang_hint"></p>
      <div class="starfield" id="starfield"><!-- JS가 별을 채움 --></div>
    </section>

    <!-- 4. 아이동월드 설명 -->
    <section class="about">
      <div class="glass-card">
        <p class="kicker" data-i18n="about_kicker">아이동월드란?</p>
        <h2 class="section-title" data-i18n="about_title"></h2>
        <p class="body-text" data-i18n="about_body"></p>
      </div>
    </section>

    <!-- 5. 반짝섬 -->
    <section class="island">
      <div class="glass-card glass-card--island">
        <p class="kicker" data-i18n="island_kicker">반짝섬</p>
        <h2 class="section-title" data-i18n="island_title"></h2>
        <p class="body-text" data-i18n="island_body"></p>
      </div>
    </section>

    <!-- 6. 준비중 버튼 -->
    <section class="cta">
      <button class="cta__btn" type="button" disabled data-i18n="cta_button">
        준비 중 · 2026년 11월 Coming Soon
      </button>

      <!-- 한국콘텐츠진흥원 지원 크레딧 (로고는 교체용 플레이스홀더) -->
      <div class="support">
        <p class="support__label" data-i18n="support_label">한국콘텐츠진흥원 지원 작품</p>
        <img class="support__logo" src="images/kocca-logo.svg"
             alt="한국콘텐츠진흥원 KOREA CREATIVE CONTENT AGENCY" width="330" height="72" />
      </div>
    </section>
  </main>

  <!-- 7. 사업자 정보 -->
  <footer class="biz">
    <p class="biz__copyright" data-i18n="biz_copyright">ⓒ MEJE Works Corp.</p>
    <p class="biz__rights" data-i18n="biz_rights">All Rights Reserved.</p>
    <p class="biz__info" data-i18n="biz_info"></p>
  </footer>

  <!-- 데이터 (오프라인 더블클릭으로도 열리도록 파일 분리 로드) -->
  <script src="data/i18n.js"></script>
  <script src="data/languages.js"></script>
  <script src="data/clock.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
